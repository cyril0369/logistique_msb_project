<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome - Simple Front Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 400px;
            margin: 80px auto;
            background: #fff;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            margin-bottom: 24px;
            color: #333;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            background: #0078d4;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .btn:hover {
            background: #005fa3;
        }
        .links {
            margin-top: 16px;
            font-size: 14px;
        }
        .links a {
            color: #0078d4;
            text-decoration: none;
            margin: 0 8px;
        }
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Logistique MSB Project</h1>
        <a href="#" class="btn">Sign Up</a>
        <a href="#" class="btn">Sign In</a>
        <div class="links">
            <a href="#">Forgot Password?</a>
            <a href="about_us.html">About us</a>
        </div>
    </div>
</body>
</html>
