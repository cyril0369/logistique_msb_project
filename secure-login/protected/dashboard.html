<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Tableau de Bord - MSB Logistique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css">
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/dashboard'" />
    </header>
    <main>
      <div class="Formulaire">
        <div class="titre-sous-titre block">
          <h1>Bienvenue, <span id="displayName">...</span> !</h1>
          <p class="sous-titre-1" style="cursor: default;">Votre tableau de bord personnel</p>
        </div>
        <div>
          Ceci est une V0, certaines fonctionnalités/éléments de design sont absentes, imprécises, incomplètes ou incorrectes. Le visuel - CSS etc. notammebt laisse souvent à désirer et sera ajusté plus tard.
        </div>

        <div class="champ-de-saisie block" style="gap: 12px;">
          <p class="corps-1"><strong>Nom d'utilisateur :</strong> <span id="displayUsername">...</span></p>
        </div>

        <div class="boutton-mdp-oublier block" style="gap: 16px; margin-top: 24px;">
          <button class="se-connecter" onclick="location.href='/goodies'">
            <h4>Commander des goodies</h4>
          </button>
          <button class="se-connecter" id="logoutBtn" style="background-color: var(--ROUGE);">
            <h4>Se déconnecter</h4>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    try {
      const res = await fetch("/api/me", { credentials: "include" });
      if (!res.ok) {
        window.location.href = "/login";
        return;
      }
      const me = await res.json();
      document.getElementById("displayName").textContent =
        `${me.first_name || ""} ${me.last_name || ""}`.trim() || me.username;
      document.getElementById("displayUsername").textContent = me.username;
    } catch (e) {
      console.error(e);
      window.location.href = "/login";
    }

    document.getElementById("logoutBtn")?.addEventListener("click", async () => {
      await fetch("/logout", { method: "POST", credentials: "include" });
      window.location.href = "/";
    });
  });
  </script>
  <script src="/hamburger.js"></script>
</body>
