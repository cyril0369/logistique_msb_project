<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Poules du Sport - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css" />
  <style>
    body {
      background:
        radial-gradient(circle at 10% 0%, #d9e6ff 0, rgba(217, 230, 255, 0) 40%),
        radial-gradient(circle at 92% 10%, #d8f8f0 0, rgba(216, 248, 240, 0) 34%),
        var(--BLANC_CASSE);
    }

    main.poules-main {
      display: block;
      justify-content: initial;
      align-items: initial;
      overflow: visible;
      flex: 1;
      padding: 24px 0 30px;
    }

    .wrap {
      width: min(1280px, 100% - 28px);
      margin: 0 auto;
    }

    .panel {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.06);
      padding: 22px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .btn-sm {
      min-width: 120px;
      min-height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--BLEU_PRINCIPAL);
      color: var(--BEIGE);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-sm:hover {
      background: var(--BLEU_CANARD);
    }

    .poule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .poule-card {
      border: 1px solid #e4e7ec;
      border-radius: 10px;
      background: #fbfcfe;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .poule-title {
      font-family: 'Montserrat', sans-serif;
      color: var(--BLEU_PRINCIPAL);
      font-size: 18px;
      line-height: 1.1;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 2px;
    }

    .chip {
      background: #e7f0ff;
      color: #1d4e89;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .team-list {
      display: grid;
      gap: 6px;
    }

    .team-item {
      padding: 8px 10px;
      border-radius: 8px;
      background: #f7fafc;
      border-left: 3px solid var(--TURQUOISE);
      font-size: 13px;
      color: #1f2937;
    }
  </style>
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/dashboard'" />
    </header>

    <main class="poules-main">
      <div class="wrap panel">
        <div class="titre-sous-titre block" style="align-items:flex-start;">
          <h1 id="sportTitle">Poules</h1>
          <p class="sous-titre-1" style="cursor: default;">Resultat du script de creation des poules.</p>
        </div>

        <div class="toolbar">
          <button class="btn-sm" onclick="location.href='/admin/poules'">Tous les sports</button>
          <button class="btn-sm" onclick="loadSportPoules()">Actualiser</button>
        </div>

        <div id="msg" class="alert err" style="display:none;"></div>
        <div id="poulesList" class="poule-grid"></div>
      </div>
    </main>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const poulesList = document.getElementById('poulesList');
    const sportTitle = document.getElementById('sportTitle');

    function showErr(text) {
      msg.textContent = text;
      msg.className = 'alert err';
      msg.style.display = 'block';
    }

    function getSportId() {
      const parts = window.location.pathname.split('/').filter(Boolean);
      const id = Number.parseInt(parts[parts.length - 1], 10);
      return Number.isInteger(id) ? id : null;
    }

    function renderPoules(payload) {
      sportTitle.textContent = `Poules - ${payload.sport.nom_sport}`;
      if (!payload.poules.length) {
        poulesList.innerHTML = '<p>Aucune poule pour ce sport.</p>';
        return;
      }

      poulesList.innerHTML = payload.poules.map((p) => {
        const chips = `
          <div class="chip-row">
            <span class="chip">${p.niveau || 'Niveau n/a'}</span>
            <span class="chip">${p.categorie || 'Categorie n/a'}</span>
            <span class="chip">${p.equipes.length} equipe(s)</span>
          </div>
        `;

        const teams = p.equipes.length
          ? p.equipes.map((e, idx) => `<div class="team-item">${idx + 1}. ${e.nom_equipe} ${e.nb_joueurs ? `(${e.nb_joueurs} joueurs)` : ''}</div>`).join('')
          : '<div class="team-item">Aucune equipe.</div>';

        return `
          <article class="poule-card">
            <div class="poule-title">${p.nom_poule || `Poule #${p.id_poule}`}</div>
            ${chips}
            <div class="team-list">${teams}</div>
          </article>
        `;
      }).join('');
    }

    async function loadSportPoules() {
      msg.style.display = 'none';
      const sportId = getSportId();
      if (!sportId) {
        showErr('sportId invalide dans l\'URL');
        return;
      }

      try {
        const res = await fetch(`/api/admin/poules/sport/${sportId}`, { credentials: 'include' });
        if (!res.ok) {
          showErr(await res.text());
          return;
        }
        const data = await res.json();
        renderPoules(data);
      } catch (e) {
        showErr('Erreur reseau');
      }
    }

    loadSportPoules();
  </script>
  <script src="/hamburger.js"></script>
</body>
</html>
