<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Poules par Sport - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css" />
  <style>
    body {
      background:
        radial-gradient(circle at 10% 0%, #d9e6ff 0, rgba(217, 230, 255, 0) 40%),
        radial-gradient(circle at 92% 10%, #d8f8f0 0, rgba(216, 248, 240, 0) 34%),
        var(--BLANC_CASSE);
    }

    main.poules-main {
      display: block;
      justify-content: initial;
      align-items: initial;
      overflow: visible;
      flex: 1;
      padding: 24px 0 30px;
    }

    .wrap {
      width: min(1240px, 100% - 28px);
      margin: 0 auto;
    }

    .panel {
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.06);
      padding: 22px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .sport-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .sport-card {
      border: 1px solid #e4e7ec;
      border-radius: 10px;
      background: #fbfcfe;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .sport-title {
      font-family: 'Montserrat', sans-serif;
      color: var(--BLEU_PRINCIPAL);
      font-size: 18px;
      line-height: 1.1;
    }

    .meta {
      font-size: 13px;
      color: #475467;
    }

    .btn-sm {
      min-width: 120px;
      min-height: 36px;
      border: none;
      border-radius: 10px;
      background: var(--BLEU_PRINCIPAL);
      color: var(--BEIGE);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-sm:hover {
      background: var(--BLEU_CANARD);
    }
  </style>
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/dashboard'" />
    </header>

    <main class="poules-main">
      <div class="wrap panel">
        <div class="titre-sous-titre block" style="align-items:flex-start;">
          <h1>Poules du Tournoi</h1>
          <p class="sous-titre-1" style="cursor: default;">Visualisation des poules, sport par sport.</p>
        </div>

        <div class="toolbar">
          <button class="btn-sm" onclick="location.href='/admin/scripts'">Retour scripts</button>
          <button class="btn-sm" onclick="loadSports()">Actualiser</button>
        </div>

        <div id="msg" class="alert err" style="display:none;"></div>
        <div id="sportsList" class="sport-grid"></div>
      </div>
    </main>
  </div>

  <script>
    const msg = document.getElementById('msg');
    const sportsList = document.getElementById('sportsList');

    function showErr(text) {
      msg.textContent = text;
      msg.className = 'alert err';
      msg.style.display = 'block';
    }

    function renderSports(rows) {
      const withPoules = rows.filter((r) => Number(r.poules_count) > 0);
      if (!withPoules.length) {
        sportsList.innerHTML = '<p class="meta">Aucune poule generee pour le moment.</p>';
        return;
      }

      sportsList.innerHTML = withPoules.map((s) => `
        <article class="sport-card">
          <div class="sport-title">${s.nom_sport}</div>
          <div class="meta">Poules: <strong>${s.poules_count}</strong></div>
          <div class="meta">Equipes: <strong>${s.equipes_count}</strong></div>
          <div>
            <button class="btn-sm" onclick="location.href='/admin/poules/${s.id_sport}'">Voir les poules</button>
          </div>
        </article>
      `).join('');
    }

    async function loadSports() {
      msg.style.display = 'none';
      try {
        const res = await fetch('/api/admin/poules/sports', { credentials: 'include' });
        if (!res.ok) {
          showErr(await res.text());
          return;
        }
        const data = await res.json();
        renderSports(data);
      } catch (e) {
        showErr('Erreur reseau');
      }
    }

    loadSports();
  </script>
  <script src="/hamburger.js"></script>
</body>
</html>
