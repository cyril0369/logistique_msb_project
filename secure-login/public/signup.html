<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inscription - MSB Logistique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css">
  <style>
    body {
      background:
        radial-gradient(circle at 10% 0%, #d9e6ff 0, rgba(217, 230, 255, 0) 40%),
        radial-gradient(circle at 92% 10%, #d8f8f0 0, rgba(216, 248, 240, 0) 34%),
        var(--BLANC_CASSE);
    }

    main.generic-page {
      display: block;
      justify-content: initial;
      align-items: initial;
      overflow: visible;
      flex: 1;
      padding: 24px 0 30px;
    }

    .generic-wrap {
      width: min(1200px, 100% - 28px);
      margin: 0 auto;
    }

    .Formulaire.generic-card {
      max-width: 980px;
      width: 100%;
      background: #fff;
      border: 1px solid #d8dde6;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(16, 24, 40, 0.06);
      padding: 28px;
      margin: 0 auto;
    }

    .Formulaire.generic-card .champ-de-saisie {
      max-width: 860px;
    }

    .Formulaire.generic-card .se-connecter {
      min-width: 170px;
      height: 44px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/login'" />
    </header>
    <main class="generic-page">
      <div class="generic-wrap">
      <div class="Formulaire generic-card">
        <div class="titre-sous-titre block">
          <h1>Inscription</h1>
          <p class="sous-titre-1" onclick="location.href='/login'">Déjà inscrit ? Se connecter</p>
        </div>

        <form id="signupForm" novalidate>
          <div class="champ-de-saisie block">
            <label for="first_name">Prénom *</label>
            <input class="input" id="first_name" name="first_name" placeholder="Jean" autocomplete="given-name" required />
            
            <label for="last_name">Nom *</label>
            <input class="input" id="last_name" name="last_name" placeholder="Thierry" autocomplete="family-name" required />
            
            <label for="gender">Sexe</label>
            <select class="input" id="gender" name="gender">
              <option value="">Sélectionner...</option>
              <option value="M">Homme</option>
              <option value="F">Femme</option>
              <option value="other">Autre</option>
            </select>
            
            <label for="email">Email *</label>
            <input class="input" id="email" name="email" type="email" placeholder="votre@email.com" autocomplete="email" required />
            
            <label for="phone">Téléphone</label>
            <input class="input" id="phone" name="phone" type="tel" placeholder="+33 6 12 34 56 78" autocomplete="tel" />
            
            <label for="username">Nom d'utilisateur *</label>
            <input class="input" id="username" name="username" placeholder="Pseudo" autocomplete="username" required />
            
            <label for="password">Mot de passe *</label>
            <input class="input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />

            <div style="margin-top:16px; width:200%;">
              
              <button class="btn_sober" type="button" onclick="location.href='/signup_staff'" style="width: 48%; margin: 2px;">Staff</button>
            </div>
            <div style="margin-top:16px; width:200%;">
              <button class="btn_sober" type="button" onclick="location.href='/signup_admin'" style="width: 48%; margin: 2px;">Team MSB</button>
            </div>
          

          </div>

          <div id="msg" class="alert" style="display:none;"></div>

          <div class="boutton-mdp-oublier block">
            <button class="se-connecter" type="submit" id="submitBtn">
              <h4>S'inscrire</h4>
            </button>
            <p class="corps-2">* Champs obligatoires</p>
          </div>
        </form>
      </div>
      </div>
    </main>
  </div>
  <script>
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");
    function showMsg(text, ok=false) {
      msg.textContent = text;
      msg.className = "alert " + (ok ? "ok" : "err");
      msg.style.display = "block";
    }
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.style.display = "none";
      const username = form.username.value.trim();
      const password = form.password.value;
      const email = form.email.value.trim();
      if (!username || !password || !email) {
        showMsg("Veuillez remplir le nom d'utilisateur, le mot de passe et l'email.");
        return;
      }
      submitBtn.disabled = true;
      try {
        const payload = {
          username,
          password,
          first_name: form.first_name?.value?.trim() || "",
          last_name: form.last_name?.value?.trim() || "",
          email: email,
          phone: form.phone?.value?.trim() || "",
          gender: form.gender?.value || ""
        };
        const res = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          const data = await res.json();
          window.location.href = data.redirect || "/dashboard";
          return;
        }
        const errText = await res.text().catch(()=>"Inscription échouée");
        showMsg(errText || "Inscription échouée");
      } catch (err) {
        showMsg("Erreur réseau. Le serveur est-il démarré ?");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="/hamburger.js"></script>
</body>
</html>
