<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Non connecté - MSB Logistique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css" />
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/login'" />
    </header>
    <main>
      <div class="Formulaire">
        <div class="titre-sous-titre block">
          <h1 style="color: #ff6b6b;">Accès Refusé</h1>
          <p class="sous-titre-1" style="cursor: default;">Vous devez être connecté pour accéder à cette page.</p>
        </div>
        
        <div class="boutton-mdp-oublier block" style="gap: 16px; margin-top: 24px;">
          <button class="se-connecter" onclick="location.href='/login'">
            <h4>Se connecter</h4>
          </button>
          <button class="se-connecter" onclick="location.href='/signup'" style="background-color: #6c757d;">
            <h4>Créer un compte</h4>
          </button>
          <p class="sous-titre-2" onclick="location.href='/'">Retour à l'accueil</p>
        </div>
      </div>
    </main>
  </div>
  <script src="/hamburger.js"></script>
</body>
</html>
