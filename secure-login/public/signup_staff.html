<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Inscription Staff - MSB Logistique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css">
  <style>
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 600px;
    }
    .form-row .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-row .input-group label {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--GRIS_FONCE);
      font-weight: 500;
    }
    .form-row .input-group input {
      max-width: none;
    }
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/login'" />
    </header>
    <main>
      <div class="Formulaire">
        <div class="titre-sous-titre block">
          <h1>Inscription Staff</h1>
          <p class="sous-titre-1" onclick="location.href='/signup'">Retour à l'inscription normale</p>
        </div>

        <form id="signupForm" novalidate>
          <div class="champ-de-saisie block">
            <div class="form-row">
              <div class="input-group">
                <label for="first_name">Prénom *</label>
                <input class="input" id="first_name" name="first_name" placeholder="Jane" required />
              </div>
              <div class="input-group">
                <label for="last_name">Nom *</label>
                <input class="input" id="last_name" name="last_name" placeholder="Doe" required />
              </div>
            </div>

            <div class="form-row">
              <div class="input-group">
                <label for="email">Email *</label>
                <input class="input" id="email" name="email" type="email" placeholder="staff@msb.fr" autocomplete="email" required />
              </div>
              <div class="input-group">
                <label for="phone">Téléphone</label>
                <input class="input" id="phone" name="phone" type="tel" placeholder="06 12 34 56 78" />
              </div>
            </div>

            <div class="form-row">
              <div class="input-group">
                <label for="username">Nom d'utilisateur *</label>
                <input class="input" id="username" name="username" placeholder="staff" autocomplete="username" required />
              </div>
              <div class="input-group">
                <label for="password">Mot de passe *</label>
                <input class="input" id="password" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required />
              </div>
            </div>

            <div class="form-row" style="grid-template-columns: 1fr;">
              <div class="input-group">
                <label for="staff_code">Code Staff *</label>
                <input class="input" id="staff_code" name="staff_code" type="password" placeholder="Votre code staff" required />
              </div>
            </div>
          </div>

          <div class="champ-de-saisie block">
            <h2 class="sous-titre-1">Informations Staff</h2>
            <div class="form-row">
              <div class="input-group">
                <label>Type de staff souhaité</label>
                <div style="display:flex; gap:12px; align-items:center;">
                  <label><input type="radio" name="staff_type" value="mixte"> Mixte</label>
                  <label><input type="radio" name="staff_type" value="jour"> Jour</label>
                  <label><input type="radio" name="staff_type" value="nuit"> Nuit</label>
                </div>
              </div>
            </div>
          </div>

          <div class="champ-de-saisie block">
            <h2 class="sous-titre-1">Questions Staff</h2>
            <div class="form-row" style="grid-template-columns: 1fr;">
              <div class="input-group">
                <label><input type="checkbox" id="tireuse" name="tireuse"> Tu sais te servir d’une tireuse ?</label>
                <label><input type="checkbox" id="cuisine" name="cuisine"> Tu es à l’aise en cuisine ?</label>
                <label><input type="checkbox" id="arbitre_beach_rugby" name="arbitre_beach_rugby"> Tu es à l’aise pour arbitrer du Beach Rugby ?</label>
                <label><input type="checkbox" id="arbitre_beach_soccer" name="arbitre_beach_soccer"> Tu es à l’aise pour arbitrer du Beach Soccer ?</label>
                <label><input type="checkbox" id="arbitre_beach_volley" name="arbitre_beach_volley"> Tu es à l’aise pour arbitrer du Beach Volley ?</label>
                <label><input type="checkbox" id="arbitre_dodgeball" name="arbitre_dodgeball"> Tu es à l’aise pour arbitrer du Dodgeball ?</label>
                <label><input type="checkbox" id="arbitre_handball" name="arbitre_handball"> Tu es à l’aise pour arbitrer du Handball ?</label>
              </div>
            </div>
          </div>

          <div id="msg" class="alert" style="display:none;"></div>

          <div class="boutton-mdp-oublier block">
            <button class="se-connecter" type="submit" id="submitBtn">
              <h4>Créer le compte</h4>
            </button>
            <p class="corps-2">* Champs obligatoires</p>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script>
    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");
    const submitBtn = document.getElementById("submitBtn");

    function showMsg(text, ok=false) {
      msg.textContent = text;
      msg.className = "alert " + (ok ? "ok" : "err");
      msg.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.style.display = "none";

      const username = form.username.value.trim();
      const password = form.password.value;
      const staff_code = form.staff_code.value;
      const email = form.email.value.trim();

      if (!username || !password || !staff_code || !email) {
        showMsg("Veuillez remplir le nom d'utilisateur, l'email, le mot de passe et le code staff.");
        return;
      }

      submitBtn.disabled = true;

      try {
        const payload = {
          username,
          password,
          staff_code,
          email,
          phone: form.phone?.value?.trim() || "",
          first_name: form.first_name?.value?.trim() || "",
          last_name: form.last_name?.value?.trim() || "",
          staff_type: (document.querySelector('input[name="staff_type"]:checked')?.value) || "",
          tireuse: !!form.tireuse?.checked,
          cuisine: !!form.cuisine?.checked,
          arbitre_beach_rugby: !!form.arbitre_beach_rugby?.checked,
          arbitre_beach_soccer: !!form.arbitre_beach_soccer?.checked,
          arbitre_beach_volley: !!form.arbitre_beach_volley?.checked,
          arbitre_dodgeball: !!form.arbitre_dodgeball?.checked,
          arbitre_handball: !!form.arbitre_handball?.checked
        };

        const res = await fetch("/signup_staff", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(payload)
        });

        if (res.ok) {
          const data = await res.json();
          window.location.href = data.redirect || "/dashboard";
          return;
        }

        const errText = await res.text().catch(() => "Inscription échouée");
        showMsg(errText || "Inscription échouée");
      } catch (err) {
        showMsg("Erreur réseau. Le serveur est-il démarré ?");
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
  <script src="/hamburger.js"></script>
</body>
</html>
