<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MSB Logistique Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles-new.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
  <div class="Page">
    <header class="desktop">
      <button class="hamburger-btn" type="button" aria-label="Menu" onclick="toggleHamburger(this)">
        <img class="hamburger-icon icon-menu" src="/assets/icon-menu.svg" alt="" aria-hidden="false" />
        <img class="hamburger-icon icon-close" src="/assets/icon-close.svg" alt="" aria-hidden="true" />
      </button>
      <img class="LogoDesktop" src="/logo.png" alt="MSB Logo" />
      <img class="icon-connexion" src="/assets/icon-user.svg" alt="Compte" onclick="location.href='/login'" />
    </header>
    <main class="main-acceil">
      <div class="info-acceil">
        <img class="image-acceil" src="/assets/msb/hero.jpg" alt="Plage du MSB" />

        <div class="info">
          <h1>Massilia Sun Ball</h1>
          <h4>28eme edition</h4>
        </div>

        <div class="info1">
          <div class="element">
            <i class="fa-solid fa-calendar-days icon" aria-hidden="true"></i>
            <h3>29 au 31 mai 2026</h3>
          </div>
          <div class="element clicable" onclick="window.open('https://www.google.com/maps/place/Le+Grau-du-Roi/', '_blank')">
            <i class="fa-solid fa-location-dot icon" aria-hidden="true"></i>
            <h3>Grau-du-Roi</h3>
          </div>
        </div>

        <div class="info1">
          <i class="fa-brands fa-instagram icon-app clicable" onclick="window.open('https://www.instagram.com/msb.ecm/', '_blank')" aria-label="Instagram"></i>
          <i class="fa-brands fa-square-facebook icon-app clicable" onclick="window.open('https://www.facebook.com/MSBECM', '_blank')" aria-label="Facebook"></i>
          <i class="fa-brands fa-youtube icon-app clicable" onclick="window.open('https://www.youtube.com/@massiliasunball8783', '_blank')" aria-label="YouTube"></i>
        </div>

        <div class="info1">
          <button class="se-connecter" onclick="location.href='/signup'">
            <h4 class="titre-button">S'inscrire</h4>
          </button>
          <button class="se-connecter" onclick="location.href='/about_us'">
            <h4 class="titre-button">Voir plus d'infos</h4>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="/hamburger.js"></script>
</body>
</html>
