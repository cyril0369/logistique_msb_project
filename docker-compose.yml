version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: msb-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: msb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/schema.sql:/docker-entrypoint-initdb.d/01-init_msb.sql:ro
    networks:
      - msb-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: msb-api
    restart: always
    ports:
      - "80:80"
    environment:
      DATABASE_URL: postgres://postgres:123@postgres:5432/msb
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    networks:
      - msb-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: msb-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost
    depends_on:
      - api
    volumes:
      - ./apps/frontend:/app
    networks:
      - msb-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: msb-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@msb.com
      PGADMIN_DEFAULT_PASSWORD: admin
      GUNICORN_ACCESS_LOG_LEVEL: warning
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - msb-network

volumes:
  postgres-data:
  pgadmin-data:

networks:
  msb-network:
    driver: bridge
