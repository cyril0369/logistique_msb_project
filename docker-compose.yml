version: '3.8'

services:
  react-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msb-react-app
    ports:
      - "3000:3000"
    volumes:
      # Monter le code source pour le hot-reload en développement
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_DB_HOST=postgres
      - REACT_APP_DB_PORT=5432
      - REACT_APP_DB_NAME=msb_db
      - REACT_APP_DB_USER=msb_user
      - REACT_APP_DB_PASSWORD=msb_password
    depends_on:
      - postgres
    stdin_open: true
    tty: true
    networks:
      - msb-network

  postgres:
    image: postgres:15-alpine
    container_name: msb-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: msb_user
      POSTGRES_PASSWORD: msb_password
      POSTGRES_DB: msb_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - msb-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: msb-pgadmin
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@msb.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - msb-network

networks:
  msb-network:
    driver: bridge

volumes:
  postgres-data:
  pgadmin-data:
